<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Light</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="status-plane" aria-live="polite">
        <div class="traffic-light" aria-label="Cursor hook status lights">
          <div class="lamp lamp-red" data-status="red" aria-hidden="true">
            <span></span>
          </div>
          <div class="lamp lamp-yellow" data-status="yellow" aria-hidden="true">
            <span></span>
          </div>
          <div class="lamp lamp-green active" data-status="green" aria-hidden="true">
            <span></span>
          </div>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
