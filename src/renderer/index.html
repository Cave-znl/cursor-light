<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Light</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <div class="setup-panel hidden" id="setupPanel">
        <p>是否自动配置 Cursor Hooks？</p>
        <div>
          <button id="setupConfirm" type="button">自动配置</button>
          <button id="setupSkip" type="button">跳过</button>
        </div>
      </div>

      <div class="context-menu hidden" id="contextMenu">
        <button data-action="horizontal" type="button">横向</button>
        <button data-action="vertical" type="button">竖向</button>
        <button data-action="configure" type="button">配置</button>
        <button data-action="quit" type="button">退出</button>
      </div>

      <section class="status-plane" aria-live="polite" data-tauri-drag-region>
        <div class="traffic-light" aria-label="Cursor hook status lights" data-tauri-drag-region>
          <div class="lamp lamp-red" data-status="red" aria-hidden="true">
            <span></span>
          </div>
          <div class="lamp lamp-yellow" data-status="yellow" aria-hidden="true">
            <span></span>
          </div>
          <div class="lamp lamp-green active" data-status="green" aria-hidden="true">
            <span></span>
          </div>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
