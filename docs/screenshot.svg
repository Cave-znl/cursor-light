<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Cursor Light screenshot">
  <defs>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#141719"/>
      <stop offset="1" stop-color="#0d0f10"/>
    </linearGradient>
    <linearGradient id="case" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#202427"/>
      <stop offset="1" stop-color="#101214"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".36"/>
    </filter>
    <filter id="greenGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#35dc74" flood-opacity=".95"/>
    </filter>
    <filter id="yellowGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#ffd449" flood-opacity=".75"/>
    </filter>
    <filter id="redGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#ff4037" flood-opacity=".72"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#screen)"/>
  <path d="M0 72h960M0 144h960M0 216h960M0 288h960M0 360h960M0 432h960M120 0v540M240 0v540M360 0v540M480 0v540M600 0v540M720 0v540M840 0v540" stroke="#ffffff" stroke-opacity=".035"/>

  <g transform="translate(76 86)" filter="url(#shadow)">
    <rect width="288" height="74" rx="10" fill="url(#case)" stroke="#ffffff" stroke-opacity=".18"/>
    <circle cx="56" cy="37" r="24" fill="#070809"/>
    <circle cx="56" cy="37" r="15" fill="#ff4037" opacity=".22"/>
    <circle cx="144" cy="37" r="24" fill="#070809"/>
    <circle cx="144" cy="37" r="15" fill="#ffd449" opacity=".22"/>
    <circle cx="232" cy="37" r="24" fill="#070809"/>
    <circle cx="232" cy="37" r="15" fill="#35dc74" filter="url(#greenGlow)"/>
  </g>

  <g transform="translate(560 86)" filter="url(#shadow)">
    <rect width="84" height="272" rx="12" fill="url(#case)" stroke="#ffffff" stroke-opacity=".18"/>
    <circle cx="42" cy="52" r="25" fill="#070809"/>
    <circle cx="42" cy="52" r="16" fill="#ff4037" filter="url(#redGlow)" opacity=".9"/>
    <circle cx="42" cy="136" r="25" fill="#070809"/>
    <circle cx="42" cy="136" r="16" fill="#ffd449" filter="url(#yellowGlow)" opacity=".86"/>
    <circle cx="42" cy="220" r="25" fill="#070809"/>
    <circle cx="42" cy="220" r="16" fill="#35dc74" filter="url(#greenGlow)"/>
  </g>

  <text x="76" y="432" fill="#f5f2e8" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Cursor Light</text>
  <text x="76" y="470" fill="#9fa8a5" font-family="Segoe UI, Arial, sans-serif" font-size="20">Always-on-top red/yellow/green status widget for Cursor hooks.</text>
</svg>
